<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANIMATCH ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --text-sub: #888;
      --accent: #f5a623;
      --green: #4caf50;
      --blue: #2196f3;
      --purple: #9c27b0;
      --red: #f44336;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }

    /* ===== PASSWORD GATE ===== */
    #gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    .gate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 340px;
      text-align: center;
    }
    .gate-logo {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .gate-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .gate-sub {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 28px;
    }
    .gate-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
    }
    .gate-input:focus { border-color: var(--accent); }
    .gate-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .gate-btn:hover { opacity: 0.9; }
    .gate-error {
      color: var(--red);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ===== DASHBOARD ===== */
    #app { display: none; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo { font-size: 22px; font-weight: 800; color: var(--accent); }
    .header-sub { font-size: 13px; color: var(--text-sub); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
    }
    .refresh-btn:hover { border-color: var(--accent); }
    .last-updated {
      font-size: 12px;
      color: var(--text-sub);
    }

    .main {
      padding: 28px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .kpi-label {
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .kpi-value {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }
    .kpi-sub {
      font-size: 12px;
      color: var(--text-sub);
    }
    .kpi-card.accent .kpi-value { color: var(--accent); }
    .kpi-card.green  .kpi-value { color: var(--green); }
    .kpi-card.blue   .kpi-value { color: var(--blue); }
    .kpi-card.purple .kpi-value { color: var(--purple); }

    /* Grid layout */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .grid-full {
      margin-bottom: 20px;
    }
    @media (max-width: 1024px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 20px;
    }

    /* Chart containers */
    .chart-wrap {
      position: relative;
      height: 300px;
    }
    .chart-wrap-lg {
      position: relative;
      height: 380px;
    }

    /* Type ranking table */
    .rank-table {
      width: 100%;
      border-collapse: collapse;
    }
    .rank-table th {
      font-size: 11px;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .rank-table td {
      padding: 10px 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .rank-table tr:last-child td { border-bottom: none; }
    .rank-table tr:hover td { background: var(--surface2); }
    .rank-no {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 600;
    }
    .rank-type {
      font-family: monospace;
      font-weight: 700;
      color: var(--accent);
    }
    .rank-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      width: 100px;
    }
    .rank-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
    }
    .rank-pct {
      font-size: 13px;
      color: var(--text-sub);
      text-align: right;
    }

    /* Question section */
    .questions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 800px) {
      .questions-grid { grid-template-columns: 1fr; }
    }
    .q-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .q-num {
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .q-text {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .q-choice {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .q-choice-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      width: 16px;
      flex-shrink: 0;
    }
    .q-choice-text {
      font-size: 12px;
      color: var(--text-sub);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .q-bar-wrap {
      flex: 2;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      max-width: 120px;
    }
    .q-bar-fill-a { height: 100%; background: var(--blue); border-radius: 4px; }
    .q-bar-fill-b { height: 100%; background: var(--purple); border-radius: 4px; }
    .q-pct {
      font-size: 13px;
      font-weight: 700;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Recent sessions */
    .sessions-table {
      width: 100%;
      border-collapse: collapse;
    }
    .sessions-table th {
      font-size: 11px;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .sessions-table td {
      padding: 9px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .sessions-table tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-done { background: rgba(76,175,80,0.15); color: var(--green); }
    .badge-drop { background: rgba(244,67,54,0.12); color: var(--red); }
    .monotype { font-family: monospace; color: var(--accent); font-weight: 700; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--text-sub);
      font-size: 14px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ===== PASSWORD GATE ===== -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">🐾</div>
    <div class="gate-title">ANIMATCH</div>
    <div class="gate-sub">管理ダッシュボード</div>
    <input id="pw-input" class="gate-input" type="password" placeholder="パスワードを入力" />
    <button class="gate-btn" onclick="checkPassword()">ログイン</button>
    <div class="gate-error" id="gate-error">パスワードが違います</div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="app">
  <header class="header">
    <div class="header-left">
      <div class="header-logo">🐾 ANIMATCH</div>
      <div class="header-sub">診断分析ダッシュボード</div>
    </div>
    <div class="header-right">
      <div class="last-updated" id="last-updated">—</div>
      <button class="refresh-btn" onclick="loadAll()">↻ 更新</button>
    </div>
  </header>

  <main class="main">
    <!-- KPI -->
    <div class="kpi-grid" id="kpi-area">
      <div class="loading"><span class="spinner"></span>読み込み中...</div>
    </div>

    <!-- 結果タイプ分布 + 日別推移 -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">結果タイプ ランキング</div>
        <div id="rank-area"><div class="loading"><span class="spinner"></span></div></div>
      </div>
      <div class="card">
        <div class="card-title">日別セッション推移</div>
        <div class="chart-wrap-lg">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- タイプ別棒グラフ -->
    <div class="grid-full card">
      <div class="card-title">タイプ別診断数 分布</div>
      <div class="chart-wrap">
        <canvas id="type-chart"></canvas>
      </div>
    </div>

    <!-- 設問回答分布 -->
    <div class="grid-full card">
      <div class="card-title">設問別 回答分布</div>
      <div class="questions-grid" id="questions-area">
        <div class="loading"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- 最近のセッション -->
    <div class="grid-full card">
      <div class="card-title">最近のセッション（最新50件）</div>
      <div id="sessions-area"><div class="loading"><span class="spinner"></span></div></div>
    </div>
  </main>
</div>

<script>
/* ===== CONFIG ===== */
const PASSWORD = 'blinx2025';
const SUPABASE_URL = 'https://lfdmnfnrfwljdeoubfvx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmZG1uZm5yZndsamRlb3ViZnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3ODc1MjMsImV4cCI6MjA4NzM2MzUyM30.3X5JQ4UOmjJV3cx5_CBMPicV8yCe_O0pIrhqFquya90';

const TYPE_NAMES = {
  JEAN: '一途な柴犬', JEAT: '欲張りなコーギー', JESN: '愛情系オウム', JEST: '感性系ユニコーン',
  JCAN: 'マイペースなコアラ', JCAT: '静かな審美家', JCSN: '個性派コレクター', JCST: '哲学系アーティスト',
  KEAN: '熱量系ライオン', KEAT: '元気なパンダ', KESN: '行動派チーター', KEST: '直感型クリエイター',
  KCAN: '鋭い審美眼チーター', KCAT: '孤独なキリン', KCSN: '衝動型T・レックス', KCST: '戦略的フクロウ'
};

let db = null;
let trendChart = null;
let typeChart = null;

/* ===== AUTH ===== */
function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD || localStorage.getItem('animatch_auth') === 'ok') {
    localStorage.setItem('animatch_auth', 'ok');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initDashboard();
  } else {
    document.getElementById('gate-error').style.display = 'block';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// 認証済みなら直接表示
if (localStorage.getItem('animatch_auth') === 'ok') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

/* ===== INIT ===== */
async function initDashboard() {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  await loadAll();
  // 2分ごと自動更新
  setInterval(loadAll, 120000);
}

async function loadAll() {
  const now = new Date().toLocaleString('ja-JP');
  document.getElementById('last-updated').textContent = `最終更新: ${now}`;
  await Promise.all([
    loadKPI(),
    loadRanking(),
    loadTrend(),
    loadTypeChart(),
    loadQuestions(),
    loadRecentSessions()
  ]);
}

/* ===== KPI ===== */
async function loadKPI() {
  const { data: funnel } = await db.from('animatch_funnel').select('*');
  const { data: sessions } = await db.from('animatch_sessions').select('started_at').gte(
    'started_at', new Date(Date.now() - 86400000).toISOString()
  );

  const total = funnel?.reduce((s, r) => s + Number(r.total_sessions), 0) ?? 0;
  const completed = funnel?.reduce((s, r) => s + Number(r.completed_sessions), 0) ?? 0;
  const rate = total > 0 ? (completed / total * 100).toFixed(1) : 0;
  const today = sessions?.length ?? 0;

  // 今日の完了数
  const { data: todayCompleted } = await db.from('animatch_sessions')
    .select('id')
    .eq('completed', true)
    .gte('completed_at', new Date(Date.now() - 86400000).toISOString());
  const todayComp = todayCompleted?.length ?? 0;

  document.getElementById('kpi-area').innerHTML = `
    <div class="kpi-card accent">
      <div class="kpi-label">総セッション数</div>
      <div class="kpi-value">${total.toLocaleString()}</div>
      <div class="kpi-sub">全期間累計</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">診断完了数</div>
      <div class="kpi-value">${completed.toLocaleString()}</div>
      <div class="kpi-sub">全期間累計</div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">完了率</div>
      <div class="kpi-value">${rate}%</div>
      <div class="kpi-sub">完了 / 総セッション</div>
    </div>
    <div class="kpi-card purple">
      <div class="kpi-label">過去24時間</div>
      <div class="kpi-value">${today.toLocaleString()}</div>
      <div class="kpi-sub">うち完了: ${todayComp}</div>
    </div>
  `;
}

/* ===== RANKING TABLE ===== */
async function loadRanking() {
  const { data } = await db.from('animatch_result_stats').select('*');
  if (!data || data.length === 0) {
    document.getElementById('rank-area').innerHTML = '<div class="loading">データなし</div>';
    return;
  }

  const rows = data.map((r, i) => `
    <tr>
      <td class="rank-no">#${i + 1}</td>
      <td>
        <span class="rank-type">${r.result_type}</span><br>
        <span style="font-size:12px;color:var(--text-sub)">${TYPE_NAMES[r.result_type] || r.result_name || ''}</span>
      </td>
      <td style="font-weight:700">${r.count}</td>
      <td>
        <div class="rank-bar">
          <div class="rank-bar-fill" style="width:${r.percentage}%"></div>
        </div>
      </td>
      <td class="rank-pct">${r.percentage}%</td>
    </tr>
  `).join('');

  document.getElementById('rank-area').innerHTML = `
    <table class="rank-table">
      <thead>
        <tr>
          <th>#</th><th>タイプ</th><th>人数</th><th colspan="2">割合</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

/* ===== TREND CHART ===== */
async function loadTrend() {
  const { data } = await db.from('animatch_funnel').select('*').order('date', { ascending: true }).limit(30);
  if (!data) return;

  const labels = data.map(r => {
    const d = new Date(r.date);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  });
  const totals = data.map(r => Number(r.total_sessions));
  const completes = data.map(r => Number(r.completed_sessions));

  if (trendChart) trendChart.destroy();
  const ctx = document.getElementById('trend-chart').getContext('2d');
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '総セッション',
          data: totals,
          borderColor: '#2196f3',
          backgroundColor: 'rgba(33,150,243,0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 3
        },
        {
          label: '完了',
          data: completes,
          borderColor: '#4caf50',
          backgroundColor: 'rgba(76,175,80,0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#888', font: { size: 12 } } }
      },
      scales: {
        x: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#2e2e2e' } },
        y: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#2e2e2e' }, beginAtZero: true }
      }
    }
  });
}

/* ===== TYPE BAR CHART ===== */
async function loadTypeChart() {
  const { data } = await db.from('animatch_result_stats').select('*');
  if (!data || data.length === 0) return;

  const labels = data.map(r => r.result_type);
  const values = data.map(r => Number(r.count));
  const colors = data.map((_, i) => `hsl(${(i * 23) % 360}, 70%, 55%)`);

  if (typeChart) typeChart.destroy();
  const ctx = document.getElementById('type-chart').getContext('2d');
  typeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '診断数',
        data: values,
        backgroundColor: colors,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: { ticks: { color: '#888', font: { size: 12, family: 'monospace' } }, grid: { color: '#2e2e2e' } },
        y: { ticks: { color: '#888', font: { size: 12 } }, grid: { color: '#2e2e2e' }, beginAtZero: true }
      }
    }
  });
}

/* ===== QUESTION STATS ===== */
async function loadQuestions() {
  const { data } = await db.from('animatch_question_stats').select('*');
  if (!data || data.length === 0) {
    document.getElementById('questions-area').innerHTML = '<div class="loading">データなし</div>';
    return;
  }

  // 設問番号でグループ化
  const questions = {};
  data.forEach(r => {
    if (!questions[r.question_number]) questions[r.question_number] = { text: r.question_text, choices: {} };
    questions[r.question_number].choices[r.choice] = r;
  });

  const cards = Object.keys(questions).sort().map(qNum => {
    const q = questions[qNum];
    const a = q.choices['A'] || {};
    const b = q.choices['B'] || {};
    const aCount = Number(a.count || 0);
    const bCount = Number(b.count || 0);
    const total = aCount + bCount;
    const aPct = total > 0 ? Math.round(aCount / total * 100) : 0;
    const bPct = total > 0 ? 100 - aPct : 0;

    return `
      <div class="q-card">
        <div class="q-num">Q${qNum}</div>
        <div class="q-text">${q.text || `質問${qNum}`}</div>
        <div class="q-choice">
          <div class="q-choice-label">A</div>
          <div class="q-choice-text">${a.choice_text || 'A'}</div>
          <div class="q-bar-wrap">
            <div class="q-bar-fill-a" style="width:${aPct}%"></div>
          </div>
          <div class="q-pct" style="color:var(--blue)">${aPct}%</div>
        </div>
        <div class="q-choice">
          <div class="q-choice-label">B</div>
          <div class="q-choice-text">${b.choice_text || 'B'}</div>
          <div class="q-bar-wrap">
            <div class="q-bar-fill-b" style="width:${bPct}%"></div>
          </div>
          <div class="q-pct" style="color:var(--purple)">${bPct}%</div>
        </div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:8px">n = ${total.toLocaleString()}</div>
      </div>
    `;
  }).join('');

  document.getElementById('questions-area').innerHTML = cards;
}

/* ===== RECENT SESSIONS ===== */
async function loadRecentSessions() {
  const { data } = await db
    .from('animatch_sessions')
    .select('started_at, completed, result_type, result_name, referrer, user_agent')
    .order('started_at', { ascending: false })
    .limit(50);

  if (!data || data.length === 0) {
    document.getElementById('sessions-area').innerHTML = '<div class="loading">データなし</div>';
    return;
  }

  const rows = data.map(r => {
    const d = new Date(r.started_at);
    const ts = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const badge = r.completed
      ? '<span class="badge badge-done">完了</span>'
      : '<span class="badge badge-drop">離脱</span>';
    const typeCell = r.result_type
      ? `<span class="monotype">${r.result_type}</span> <span style="font-size:12px;color:var(--text-sub)">${TYPE_NAMES[r.result_type] || ''}</span>`
      : '<span style="color:var(--text-sub)">—</span>';
    const ref = r.referrer ? new URL(r.referrer).hostname.replace('www.', '') : '直接';
    const ua = r.user_agent || '';
    const device = /iPhone|Android|Mobile/.test(ua) ? '📱' : '💻';

    return `<tr>
      <td>${ts}</td>
      <td>${badge}</td>
      <td>${typeCell}</td>
      <td style="font-size:12px;color:var(--text-sub)">${ref}</td>
      <td style="text-align:center">${device}</td>
    </tr>`;
  }).join('');

  document.getElementById('sessions-area').innerHTML = `
    <div style="overflow-x:auto">
      <table class="sessions-table">
        <thead>
          <tr>
            <th>開始時刻</th>
            <th>ステータス</th>
            <th>タイプ</th>
            <th>流入元</th>
            <th>端末</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

/* ===== BOOT ===== */
if (localStorage.getItem('animatch_auth') === 'ok') {
  initDashboard();
}
